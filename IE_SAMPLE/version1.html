<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>인터에듀 참여자 서비스</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Pretendard', sans-serif; background-color: #f2f4f6; color: #191f28; scroll-behavior: smooth; }
        .nav-item { cursor: pointer; transition: all 0.2s; position: relative; padding: 1.25rem 0.25rem; }
        .nav-item:hover { color: #3182f6; }
        .nav-item.active { color: #3182f6; font-weight: 700; }
        .nav-item.active::after {
            content: ''; position: absolute; bottom: 0; left: 0; right: 0;
            height: 3px; background-color: #3182f6; border-radius: 3px 3px 0 0;
        }
        .page-content { display: none; animation: fadeIn 0.3s ease-out; }
        .page-content.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .card { background: white; border-radius: 24px; padding: 24px; box-shadow: 0 2px 12px rgba(0,0,0,0.02); }
    </style>
</head>
<body>

    <nav class="sticky top-0 z-50 bg-white/90 backdrop-blur-md border-b border-gray-100">
        <div class="max-w-5xl mx-auto px-5 h-16 flex items-center justify-between">
            <div class="text-xl font-extrabold text-[#3182f6] tracking-tighter cursor-pointer" onclick="showPage('explore')">InterEdu</div>
            <div class="flex items-center space-x-8 text-[15px] font-semibold text-[#4e5968]">
                <div id="btn-explore" class="nav-item active" onclick="showPage('explore')">프로그램 탐색</div>
                <div id="btn-activity" class="nav-item" onclick="showPage('activity')">나의 활동</div>
                <div id="btn-profile" class="nav-item" onclick="showPage('profile')">내 정보 관리</div>
            </div>
            <div class="w-8 h-8 bg-gray-200 rounded-full"></div>
        </div>
    </nav>

    <main class="max-w-2xl mx-auto px-5 py-10">

        <div id="page-explore" class="page-content active">
            <h1 class="text-2xl font-bold mb-6">어떤 체험을 찾으시나요?</h1>
            <div class="space-y-4">
                <div class="card border border-gray-100">
                    <div class="flex justify-between items-start">
                        <div>
                            <span class="text-xs font-bold text-blue-500 bg-blue-50 px-2 py-1 rounded">인기</span>
                            <h3 class="text-lg font-bold mt-2">로봇 축구 제작 체험</h3>
                            <p class="text-sm text-gray-500 mt-1">단체 전용 | 120분 소요</p>
                        </div>
                        <button class="text-sm font-bold text-[#3182f6]">견적문의</button>
                    </div>
                </div>
                <div class="card border border-gray-100">
                    <h3 class="text-lg font-bold">찾아가는 드론 축제</h3>
                    <p class="text-sm text-gray-500 mt-1">개인/단체 | 180분 소요</p>
                    <button class="mt-4 w-full py-3 bg-[#f2f4f6] rounded-xl font-bold text-sm">상세보기</button>
                </div>
            </div>
        </div>

        <div id="page-activity" class="page-content">
            <h1 class="text-2xl font-bold mb-6">나의 활동</h1>
            <div class="space-y-4">
                <div class="card flex justify-between items-center cursor-pointer">
                    <div>
                        <h3 class="font-bold">프로그램 신청내역</h3>
                        <p class="text-sm text-gray-400">신청내역 및 계약현황 조회</p>
                    </div>
                    <svg class="w-5 h-5 text-gray-300" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"></path></svg>
                </div>
                <div class="card flex justify-between items-center cursor-pointer">
                    <div>
                        <div class="flex items-center space-x-2">
                            <h3 class="font-bold">활동 기록장</h3>
                            <span class="text-[10px] bg-red-100 text-red-500 px-1.5 py-0.5 rounded font-bold italic">NEW</span>
                        </div>
                        <p class="text-sm text-gray-400">내 체험 사진이 자동으로 생성됩니다</p>
                    </div>
                    <svg class="w-5 h-5 text-gray-300" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"></path></svg>
                </div>
                <div class="grid grid-cols-2 gap-4">
                    <div class="card text-center">
                        <p class="text-2xl mb-1">⭐️</p>
                        <p class="font-bold text-sm">만족도 조사</p>
                    </div>
                    <div class="card text-center">
                        <p class="text-2xl mb-1">📜</p>
                        <p class="font-bold text-sm">수료증 발급</p>
                    </div>
                </div>
            </div>
        </div>

        <div id="page-profile" class="page-content">
            <h1 class="text-2xl font-bold mb-6">내 정보 관리</h1>
            <div class="card">
                <div class="flex items-center space-x-4 mb-8">
                    <div class="w-16 h-16 bg-blue-100 rounded-full flex items-center justify-center text-blue-500 font-bold text-xl">김</div>
                    <div>
                        <h3 class="font-bold text-lg text-gray-800">김철수 참여자님</h3>
                        <p class="text-sm text-gray-400 font-medium">개인회원 | chulsoo@mail.com</p>
                    </div>
                </div>
                <div class="space-y-6">
                    <div class="flex justify-between items-center border-b border-gray-50 pb-4">
                        <span class="text-[#4e5968] font-medium">개인정보 수정</span>
                        <span class="text-gray-300 font-bold">></span>
                    </div>
                    <div class="flex justify-between items-center border-b border-gray-50 pb-4">
                        <span class="text-[#4e5968] font-medium">비밀번호 변경</span>
                        <span class="text-gray-300 font-bold">></span>
                    </div>
                    <div class="flex justify-between items-center text-red-500 pt-2">
                        <span class="font-medium">로그아웃</span>
                    </div>
                </div>
            </div>
        </div>

    </main>

    <script>
        function showPage(pageId) {
            // 모든 콘텐츠 숨기기
            document.querySelectorAll('.page-content').forEach(page => {
                page.classList.remove('active');
            });
            // 선택한 콘텐츠 보이기
            document.getElementById('page-' + pageId).classList.add('active');

            // 내비게이션 활성화 표시 변경
            document.querySelectorAll('.nav-item').forEach(btn => {
                btn.classList.remove('active');
            });
            document.getElementById('btn-' + pageId).classList.add('active');

            // 페이지 상단으로 스크롤
            window.scrollTo(0, 0);
        }
    </script>
</body>
</html>
