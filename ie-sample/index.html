<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>인터에듀 파트너 - 현장관리</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&display=swap');
        body { font-family: 'Noto Sans KR', sans-serif; background-color: #f8f9fa; }
        .sticky-bottom { position: fixed; bottom: 0; left: 0; right: 0; background: white; border-top: 1px solid #e5e7eb; padding: 1rem; }
    </style>
</head>
<body class="pb-24">

    <header class="bg-white border-b p-4 sticky top-0 z-10 flex items-center justify-between">
        <button class="text-gray-600">◀</button>
        <h1 class="font-bold text-lg text-gray-800">현장 운영 관리</h1>
        <div class="w-6"></div>
    </header>

    <main class="p-4 space-y-6">
        
        <section class="bg-blue-600 rounded-xl p-4 text-white shadow-md">
            <div class="text-xs opacity-80 mb-1">2026.03.23 (월) 14:00</div>
            <h2 class="text-xl font-bold mb-2">로봇 코딩 기초 체험 (3회차)</h2>
            <div class="flex items-center text-sm">
                <span class="bg-blue-500 px-2 py-0.5 rounded mr-2">강남청소년수련관</span>
                <span>대상: 초등 저학년</span>
            </div>
        </section>

        <section>
            <div class="flex justify-between items-end mb-3">
                <h3 class="font-bold text-gray-800 text-lg">실시간 출석부</h3>
                <span class="text-sm text-blue-600 font-medium">참여 8 / 전체 10</span>
            </div>
            <div class="bg-white rounded-xl shadow-sm border overflow-hidden">
                <table class="w-full text-left">
                    <thead class="bg-gray-50 text-xs text-gray-500 uppercase">
                        <tr>
                            <th class="px-4 py-2">성함</th>
                            <th class="px-4 py-2 text-center">상태</th>
                        </tr>
                    </thead>
                    <tbody class="divide-y text-sm">
                        <tr>
                            <td class="px-4 py-3 font-medium">김철수</td>
                            <td class="px-4 py-3">
                                <div class="flex justify-center gap-2">
                                    <button class="px-3 py-1 bg-blue-100 text-blue-700 rounded-full text-xs font-bold">출석</button>
                                    <button class="px-3 py-1 bg-gray-100 text-gray-400 rounded-full text-xs">결석</button>
                                </div>
                            </td>
                        </tr>
                        <tr>
                            <td class="px-4 py-3 font-medium">이영희</td>
                            <td class="px-4 py-3">
                                <div class="flex justify-center gap-2">
                                    <button class="px-3 py-1 bg-blue-100 text-blue-700 rounded-full text-xs font-bold">출석</button>
                                    <button class="px-3 py-1 bg-gray-100 text-gray-400 rounded-full text-xs">결석</button>
                                </div>
                            </td>
                        </tr>
                        <tr class="bg-red-50">
                            <td class="px-4 py-3 font-medium text-red-600">박민수</td>
                            <td class="px-4 py-3">
                                <div class="flex justify-center gap-2">
                                    <button class="px-3 py-1 bg-gray-100 text-gray-400 rounded-full text-xs">출석</button>
                                    <button class="px-3 py-1 bg-red-500 text-white rounded-full text-xs font-bold">결석</button>
                                </div>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </section>

        <section>
            <h3 class="font-bold text-gray-800 text-lg mb-3">활동 사진 업로드</h3>
            <div class="grid grid-cols-3 gap-2">
                <label class="aspect-square border-2 border-dashed border-gray-300 rounded-lg flex flex-col items-center justify-center bg-white cursor-pointer hover:bg-gray-50">
                    <span class="text-2xl text-gray-400">+</span>
                    <span class="text-[10px] text-gray-400">사진 추가</span>
                    <input type="file" class="hidden" multiple accept="image/*">
                </label>
                <div class="relative aspect-square rounded-lg overflow-hidden border">
                    <img src="https://via.placeholder.com/150" class="w-full h-full object-cover" alt="활동사진">
                    <button class="absolute top-1 right-1 bg-black/50 text-white text-[10px] w-4 h-4 rounded-full">×</button>
                </div>
            </div>
            <p class="text-[11px] text-gray-500 mt-2">* 사진은 최대 10장까지 등록 가능하며 결과보고서에 자동 포함됩니다.</p>
        </section>

        <section>
            <h3 class="font-bold text-gray-800 text-lg mb-3">현장 일지 (메모)</h3>
            <textarea class="w-full h-24 p-3 border rounded-xl text-sm focus:ring-2 focus:ring-blue-500 focus:outline-none" placeholder="오늘 수업의 특이사항이나 아동들의 반응을 기록해주세요."></textarea>
        </section>

    </main>

    <div class="sticky-bottom flex gap-3">
        <button class="flex-1 py-4 border border-gray-300 rounded-xl font-bold text-gray-600 hover:bg-gray-50">임시 저장</button>
        <button class="flex-[2] py-4 bg-blue-600 rounded-xl font-bold text-white shadow-lg shadow-blue-200 active:bg-blue-700">활동 완료 등록</button>
    </div>

</body>
</html>
